<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Mundari Sabdkosh</title>
<link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/dark.css">
<link rel="stylesheet" href="assets/css/light.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="auth-page">
<div class="auth-container">
    <div class="auth-header">
        <div class="auth-logo">म</div>
        <h1>Welcome Back</h1>
        <p>Sign in to continue to Mundari Sabdkosh</p>
    </div>
    <div class="auth-card">
        <div id="login-error" style="display:none;" class="toast toast-error" style="margin-bottom:16px;display:flex;"></div>
        <form onsubmit="return handleLogin(event)">
            <div class="form-group"><label class="form-label">Email Address</label><input type="email" id="login-email" class="form-input" placeholder="your@email.com" required></div>
            <div class="form-group"><label class="form-label">Password</label><input type="password" id="login-password" class="form-input" placeholder="Enter your password" required></div>
            <div class="form-group" style="display:flex;align-items:center;justify-content:space-between;">
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;"><input type="checkbox" style="width:16px;height:16px;"> Remember me</label>
                <a href="forgot-password.html" style="font-size:13px;color:var(--accent-primary);">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Sign In</button>
        </form>
        <div class="auth-divider">or continue with</div>
        <div class="grid grid-2" style="gap:8px;">
            <button class="btn btn-secondary" style="justify-content:center;"><i class="fab fa-google"></i> Google</button>
            <button class="btn btn-secondary" style="justify-content:center;"><i class="fab fa-github"></i> GitHub</button>
        </div>
    </div>
    <div class="auth-footer">Don't have an account? <a href="register.html" style="color:var(--accent-primary);font-weight:500;">Create one</a></div>
</div>
</div>
<script src="assets/js/data.js"></script>
<script>
    async function handleLogin(e) {
        e.preventDefault();
        await DB.init();
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        if (DB.login(email, pass)) {
            location.href = 'index.html';
        } else {
            const err = document.getElementById('login-error');
            err.style.display = 'flex';
            err.innerHTML = '<i class="fas fa-exclamation-circle"></i><span>Invalid email or password. Try: admin@mundarisabdkosh.org / password123</span>';
        }
        return false;
    }
</script>
<script src="assets/js/theme.js"></script>
</body>
</html>
