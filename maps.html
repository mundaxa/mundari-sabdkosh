<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Maps & Regions - Mundari Sabdkosh</title>
<link rel="manifest" href="manifest.json"><link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/dark.css"><link rel="stylesheet" href="assets/css/light.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="mobile-overlay"></div>
<div class="app-layout">
<div class="sidebar-placeholder"></div>
<div class="main-content">
<div class="navbar-placeholder"></div>
<div class="page-content">
<div style="margin-bottom:28px;"><h1 style="font-size:28px;font-weight:700;">Maps & Regions</h1><p style="opacity:0.5;margin-top:4px;">Explore tribal regions and cultural zones of Mundari-speaking areas</p></div>
<div class="card" style="margin-bottom:28px;"><div class="interactive-map" style="min-height:400px;" data-regions='[{"name":"Jharkhand","x":0.55,"y":0.3,"r":50,"color":"#4f7eff","label":"Jharkhand - Heartland"},{"name":"Odisha","x":0.48,"y":0.55,"r":45,"color":"#7c3aed","label":"Odisha"},{"name":"West Bengal","x":0.72,"y":0.25,"r":35,"color":"#06b6d4","label":"West Bengal"},{"name":"Assam","x":0.82,"y":0.1,"r":30,"color":"#22c55e","label":"Assam"},{"name":"Bihar","x":0.48,"y":0.12,"r":30,"color":"#f59e0b","label":"Bihar"},{"name":"Chhattisgarh","x":0.32,"y":0.48,"r":35,"color":"#ef4444","label":"Chhattisgarh"}]'></div></div>
<div class="grid grid-auto" id="regions-grid"></div>
<div class="footer-placeholder"></div>
</div></div></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script>
async function initMaps() { await DB.init();
    document.getElementById('regions-grid').innerHTML = [
        {name:'Jharkhand',desc:'Primary homeland of the Munda people',color:'#4f7eff'},
        {name:'Odisha',desc:'Southern Mundari-speaking region',color:'#7c3aed'},
        {name:'West Bengal',desc:'Eastern tribal communities',color:'#06b6d4'},
        {name:'Assam',desc:'Northeastern Munda settlements',color:'#22c55e'},
        {name:'Bihar',desc:'Historical Munda presence',color:'#f59e0b'},
        {name:'Chhattisgarh',desc:'Western tribal region',color:'#ef4444'}
    ].map(r => `<div class="category-card" style="border:1px solid var(--border-color);background:var(--bg-card);text-align:left;">
        <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:40px;height:40px;border-radius:var(--radius-md);background:${r.color}20;display:flex;align-items:center;justify-content:center;color:${r.color};"><i class="fas fa-map-pin"></i></div>
            <div><div class="cat-name" style="text-align:left;">${r.name}</div><div class="cat-count" style="text-align:left;">${r.desc}</div></div>
        </div></div>`).join('');
}
document.addEventListener('DOMContentLoaded', initMaps);
</script>
</body>
</html>
