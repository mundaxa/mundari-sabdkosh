<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word - Mundari Sabdkosh</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234f7eff'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='serif'%3Eम%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/dark.css">
<link rel="stylesheet" href="assets/css/light.css">
<link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="mobile-overlay"></div>
<div class="app-layout">
<div class="sidebar-placeholder"></div>
<div class="main-content">
<div class="navbar-placeholder" data-back="dictionary.html"></div>
<div class="page-content">
<div class="word-detail-grid" id="word-content"></div>
<div class="footer-placeholder"></div>
</div>
</div>
</div>
<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script>
async function initWord() {
    await DB.init();
    const id = new URLSearchParams(location.search).get('id');
    const word = DB.getWord(id);
    const container = document.getElementById('word-content');

    if (word) {
        const submitter = DB.getUser(word.submitted_by);
        const related = DB.getRelatedWords(word.id);
        const trend = DB.trendingWords(5);
        word.views_count = (word.views_count || 0) + 1;

        document.title = word.word + ' - Mundari Sabdkosh';
        container.innerHTML = `
        <div>
            <div class="word-detail-main">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;">
                    <div>
                        <h1 style="font-size:36px;font-weight:700;letter-spacing:-0.02em;">${word.word}</h1>
                        ${word.word_devanagari ? `<div style="font-size:22px;opacity:0.5;margin-top:4px;">${word.word_devanagari}</div>` : ''}
                        <div style="display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap;">
                            ${word.pronunciation ? `<span class="badge badge-info"><i class="fas fa-microphone"></i> ${word.pronunciation}</span>` : ''}
                            ${word.word_ipa ? `<span class="badge">/${word.word_ipa}/</span>` : ''}
                            ${word.part_of_speech ? `<span class="badge" style="background:var(--accent-primary);color:#fff;">${word.part_of_speech}</span>` : ''}
                            <span class="badge" style="background:${DB.getCategoryColor(word.category_id)}20;color:${DB.getCategoryColor(word.category_id)};"><i class="fas fa-tag"></i> ${DB.getCategoryName(word.category_id)}</span>
                        </div>
                    </div>
                </div>
                <div class="meaning-section"><h3>Meaning (English)</h3><div class="meaning-text">${word.meaning_en}</div></div>
                ${word.meaning_hi ? `<div class="meaning-section"><h3>Meaning (Hindi)</h3><div class="meaning-text">${word.meaning_hi}</div></div>` : ''}
                ${word.meaning_mun ? `<div class="meaning-section"><h3>Meaning (Mundari)</h3><div class="meaning-text">${word.meaning_mun}</div></div>` : ''}
                ${word.usage_example ? `<div class="meaning-section"><h3>Usage Example</h3><div style="padding:16px;background:var(--bg-tertiary);border-radius:var(--radius-md);font-style:italic;margin-top:4px;"><i class="fas fa-quote-left" style="position:absolute;opacity:0.2;"></i><p style="padding-left:24px;">${word.usage_example}</p></div></div>` : ''}
                ${word.etymology ? `<div class="meaning-section"><h3>Etymology</h3><div class="meaning-text">${word.etymology}</div></div>` : ''}
                ${word.synonyms || word.antonyms ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px;padding-top:24px;border-top:1px solid var(--border-color);">
                    ${word.synonyms ? `<div><h3 style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;opacity:0.5;margin-bottom:8px;">Synonyms</h3><div style="display:flex;flex-wrap:wrap;gap:6px;">${word.synonyms.split(',').map(s => `<span class="badge badge-success">${s.trim()}</span>`).join('')}</div></div>` : ''}
                    ${word.antonyms ? `<div><h3 style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;opacity:0.5;margin-bottom:8px;">Antonyms</h3><div style="display:flex;flex-wrap:wrap;gap:6px;">${word.antonyms.split(',').map(s => `<span class="badge badge-error">${s.trim()}</span>`).join('')}</div></div>` : ''}
                </div>` : ''}
            </div>
        </div>
        <div>
            <div class="sidebar-card"><h4 style="font-size:13px;font-weight:600;margin-bottom:12px;">Word Details</h4>
                <div style="font-size:13px;">
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);"><span style="opacity:0.5;">Region</span><span>${word.region || 'All Regions'}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);"><span style="opacity:0.5;">Dialect</span><span>${word.dialect || 'Standard'}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);"><span style="opacity:0.5;">Script</span><span>${word.script_type ? word.script_type.charAt(0).toUpperCase()+word.script_type.slice(1) : 'Both'}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border-color);"><span style="opacity:0.5;">Views</span><span>${DB.formatNumber(word.views_count)}</span></div>
                    <div style="display:flex;justify-content:space-between;padding:8px 0;"><span style="opacity:0.5;">Added</span><span>${DB.timeAgo(word.created_at)}</span></div>
                </div>
            </div>
            ${related.length ? `<div class="sidebar-card"><h4 style="font-size:13px;font-weight:600;margin-bottom:12px;">Related Words</h4>
                ${related.map(r => `<a href="word.html?id=${r.id}" style="display:block;padding:8px 0;border-bottom:1px solid var(--border-color);"><div style="font-size:14px;font-weight:500;">${r.word}</div><div style="font-size:12px;opacity:0.5;">${DB.truncate(r.meaning_en, 60)}</div></a>`).join('')}
            </div>` : ''}
            <div class="sidebar-card"><h4 style="font-size:13px;font-weight:600;margin-bottom:12px;">Trending Words</h4>
                ${trend.map(w => `<a href="word.html?id=${w.id}" style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-color);font-size:13px;">
                    <i class="fas fa-fire" style="color:var(--warning);font-size:12px;"></i>
                    <span style="font-weight:500;">${w.word}</span>
                    <span style="margin-left:auto;opacity:0.4;font-size:11px;">${DB.formatNumber(w.views_count)}</span>
                </a>`).join('')}
            </div>
        </div>`;
    } else {
        container.innerHTML = `<div class="empty-state" style="grid-column:1/-1;margin-top:60px;">
            <div class="empty-icon"><i class="fas fa-exclamation-circle"></i></div>
            <div class="empty-title">Word Not Found</div>
            <div class="empty-desc">The word you're looking for doesn't exist or hasn't been added yet.</div>
            <a href="dictionary.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Dictionary</a>
        </div>`;
    }
}
document.addEventListener('DOMContentLoaded', initWord);
</script>
</body>
</html>
