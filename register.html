<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Create Account - Mundari Sabdkosh</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234f7eff'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='serif'%3Eम%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/dark.css"><link rel="stylesheet" href="assets/css/light.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="auth-page">
<div class="auth-container">
<div class="auth-header"><div class="auth-logo">म</div><h1>Create Account</h1><p>Join the Mundari Sabdkosh community</p></div>
<div class="auth-card">
<div id="register-msg" style="display:none;" class="toast" style="margin-bottom:16px;display:flex;"></div>
<form onsubmit="return handleRegister(event)">
<div class="form-group"><label class="form-label">Full Name</label><input type="text" id="reg-name" class="form-input" placeholder="Your full name"></div>
<div class="form-group"><label class="form-label">Username *</label><input type="text" id="reg-user" class="form-input" placeholder="Choose a username" required></div>
<div class="form-group"><label class="form-label">Email *</label><input type="email" id="reg-email" class="form-input" placeholder="your@email.com" required></div>
<div class="form-group"><label class="form-label">Password *</label><input type="password" id="reg-pass" class="form-input" placeholder="At least 8 characters" required minlength="8"></div>
<div class="form-group"><label class="form-label">Confirm Password *</label><input type="password" id="reg-pass2" class="form-input" placeholder="Repeat password" required minlength="8"></div>
<button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Create Account</button>
</form>
</div>
<div class="auth-footer">Already have an account? <a href="login.html" style="color:var(--accent-primary);font-weight:500;">Sign in</a></div>
</div></div>
<script src="assets/js/data.js"></script>
<script>
async function handleRegister(e) {
    e.preventDefault();
    await DB.init();
    const msg = document.getElementById('register-msg');
    const pass = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    if (pass !== pass2) { msg.style.display='flex';msg.className='toast';msg.style.borderLeft='3px solid var(--error)';msg.innerHTML='<i class="fas fa-exclamation-circle" style="color:var(--error)"></i><span>Passwords do not match.</span>';return false; }
    const result = DB.register({
        username: document.getElementById('reg-user').value,
        email: document.getElementById('reg-email').value,
        full_name: document.getElementById('reg-name').value,
        password: pass
    });
    if (result === true) {
        msg.style.display='flex';msg.className='toast';msg.style.borderLeft='3px solid var(--success)';
        msg.innerHTML='<i class="fas fa-check-circle" style="color:var(--success)"></i><span>Registration successful! <a href="login.html" style="color:var(--accent-primary)">Sign in now</a></span>';
    } else {
        msg.style.display='flex';msg.className='toast';msg.style.borderLeft='3px solid var(--error)';
        msg.innerHTML='<i class="fas fa-exclamation-circle" style="color:var(--error)"></i><span>'+result+'</span>';
    }
    return false;
}
</script>
<script src="assets/js/theme.js"></script>
</body>
</html>
