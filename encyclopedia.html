<!DOCTYPE html>
<html lang="en" class="dark">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Encyclopedia - Mundari Sabdkosh</title>
<link rel="manifest" href="manifest.json"><link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234f7eff'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='serif'%3Eम%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/dark.css"><link rel="stylesheet" href="assets/css/light.css"><link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
<div class="mobile-overlay"></div>
<div class="app-layout">
<div class="sidebar-placeholder"></div>
<div class="main-content">
<div class="navbar-placeholder"></div>
<div class="page-content">
<div style="margin-bottom:28px;"><h1 style="font-size:28px;font-weight:700;">Encyclopedia</h1><p style="opacity:0.5;margin-top:4px;">Comprehensive knowledge base about Mundari language, culture, and heritage</p></div>
<div class="grid grid-auto" id="articles-grid"></div>
<div class="footer-placeholder"></div>
</div></div></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/components.js"></script>
<script>
async function initEncyc() {
    await DB.init();
    document.getElementById('articles-grid').innerHTML = DB.articles.length
        ? DB.articles.map(a => {
            const author = DB.getUser(a.author_id);
            return `<div class="article-card" style="border:1px solid var(--border-color);background:var(--bg-card);">
                ${a.featured_image ? `<img src="${a.featured_image}" alt="" class="ac-image" loading="lazy">` : ''}
                <div class="ac-body">
                    <div class="ac-tags"><span class="ac-tag" style="background:${DB.getCategoryColor(a.category_id)}20;color:${DB.getCategoryColor(a.category_id)};">${DB.getCategoryName(a.category_id)}</span>${a.is_featured ? '<span class="ac-tag" style="background:rgba(245,158,11,0.1);color:var(--warning);">Featured</span>' : ''}</div>
                    <h4 class="ac-title">${a.title}</h4>
                    <p class="ac-excerpt">${DB.truncate(a.excerpt || a.content.replace(/<[^>]+>/g,''), 150)}</p>
                    <div class="ac-meta"><span><i class="fas fa-user"></i> ${author?.full_name || 'Anonymous'}</span><span><i class="fas fa-eye"></i> ${DB.formatNumber(a.views_count)}</span><span><i class="fas fa-calendar"></i> ${DB.timeAgo(a.published_at)}</span></div>
                </div>
            </div>`;
        }).join('')
        : '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon"><i class="fas fa-globe"></i></div><div class="empty-title">No Articles Yet</div></div>';
}
document.addEventListener('DOMContentLoaded', initEncyc);
</script>
</body>
</html>
